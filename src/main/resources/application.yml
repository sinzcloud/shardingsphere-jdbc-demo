spring:
  application:
    name: shardingsphere-jdbc-demo

  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    # 指向类路径下的 sharding.yaml（也可 absolute path / file: / http: 等，见官方说明）
    url: jdbc:shardingsphere:classpath:sharding.yaml
  # JPA 配置
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  shardingsphere:
    props:
      sql-show: true
      sql-federation-type: ADVANCED   # 关键：启用联邦查询引擎
      kernel-executor-size: 20        # 根据实际情况调整线程池大小

# 日志配置
logging:
  level:
    com.austin: DEBUG
    org.apache.shardingsphere: DEBUG