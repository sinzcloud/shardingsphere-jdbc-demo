    username: root
    password: root123

rules:
  - !SHARDING
    tables:
      t_order:
        # 直接使用物理数据源，不加 _readwrite 后缀
        actualDataNodes: ds${0..1}.t_order_${0..1}
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: database_inline
        tableStrategy:
          standard:
            shardingColumn: order_id
            shardingAlgorithmName: table_inline
        keyGenerateStrategy:
          column: order_id
          keyGeneratorName: snowflake

    shardingAlgorithms:
      database_inline:
        type: INLINE
        props:
          algorithm-expression: ds${user_id % 2}
      table_inline:
        type: INLINE
        props:
          algorithm-expression: t_order_${order_id % 2}

    keyGenerators:
      snowflake:
        type: SNOWFLAKE
        props:
          worker-id: 1

  - !READWRITE_SPLITTING
    dataSourceGroups:
      ds0_group:                                    # 逻辑数据源组名
        writeDataSourceName: ds0
        readDataSourceNames:
          - ds0_slave
        loadBalancerName: random
      ds1_group:
        writeDataSourceName: ds1
        readDataSourceNames:
          - ds1_slave
        loadBalancerName: random
    loadBalancers:
      random:
        type: RANDOM